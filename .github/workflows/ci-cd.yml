name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  setup:
    name: 依賴安裝與緩存
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: 設置 Node.js 環境
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 安裝 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          run_install: false
          
      - name: 獲取 pnpm 存儲目錄
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
          
      - name: 設置 pnpm 緩存
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
            
      - name: 安裝依賴
        run: pnpm install

  lint:
    name: 代碼檢查
    needs: setup
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: 設置 Node.js 環境
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 安裝 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          run_install: false
          
      - name: 獲取 pnpm 存儲目錄
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
          
      - name: 還原 pnpm 緩存
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          
      - name: 安裝依賴
        run: pnpm install
        
      - name: ESLint 檢查
        run: pnpm lint
        
      - name: TypeScript 類型檢查
        run: pnpm type-check

  build:
    name: 構建應用
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: 設置 Node.js 環境
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 安裝 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          run_install: false
          
      - name: 還原 pnpm 緩存
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          
      - name: 安裝依賴
        run: pnpm install
        
      - name: 建置應用
        run: pnpm build
        
      - name: 上傳構建產物
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: .next
          retention-days: 7

  deploy-preview:
    name: 部署預覽環境
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: 下載構建產物
        uses: actions/download-artifact@v3
        with:
          name: build-output
          path: .next
          
      - name: 部署到 Vercel (預覽)
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./

  deploy-production:
    name: 部署生產環境
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: 下載構建產物
        uses: actions/download-artifact@v3
        with:
          name: build-output
          path: .next
          
      - name: 部署到 Vercel (生產)
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          working-directory: ./
