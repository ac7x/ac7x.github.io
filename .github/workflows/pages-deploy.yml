name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: 設置 Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 安裝 pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8
          run_install: false
          
      - name: 獲取 pnpm 存儲目錄
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT
          
      - name: 設置 pnpm 緩存
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          
      - name: 安裝依賴
        run: pnpm install
        
      - name: 構建
        run: pnpm build
        env:
          # 為 GitHub Pages 設置基本路徑
          NEXT_PUBLIC_BASE_PATH: /ac7x.github.io
          
      - name: 配置靜態導出
        run: pnpm export
        
      - name: 設置 Pages
        uses: actions/configure-pages@v3
        
      - name: 上傳產物
        uses: actions/upload-pages-artifact@v1
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v1
