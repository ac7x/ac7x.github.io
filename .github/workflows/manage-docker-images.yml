name: 管理 Docker 映像

on:
  schedule:
    - cron: '0 0 * * *'  # 每天執行一次
  workflow_dispatch:      # 允許手動觸發

env:
  EXPECTED_IMAGE_NAME: base.image
  MAX_IMAGES_TO_KEEP: 5

jobs:
  manage-images:
    runs-on: ubuntu-latest
    steps:
      - name: 檢出程式碼
        uses: actions/checkout@v4

      - name: 登入 DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 檢查映像情況
        id: check_image
        run: |
          # 檢查映像是否存在
          echo "正在檢查映像 ${{ secrets.DOCKER_USERNAME }}/${{ env.EXPECTED_IMAGE_NAME }} 是否存在..."
          
          # 使用 curl 檢查 Docker Hub API
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://hub.docker.com/v2/repositories/${{ secrets.DOCKER_USERNAME }}/${{ env.EXPECTED_IMAGE_NAME }}/tags")
          
          if [ "$HTTP_CODE" == "200" ]; then
            echo "映像存在"
            echo "image_exists=true" >> $GITHUB_OUTPUT
          else
            echo "映像不存在"
            echo "image_exists=false" >> $GITHUB_OUTPUT
          fi
      
      - name: 管理現有映像
        if: steps.check_image.outputs.image_exists == 'true'
        run: |
          echo "檢查映像名稱是否為 ${{ env.EXPECTED_IMAGE_NAME }}..."
          
          # 獲取所有映像標籤並按日期排序
          TAGS=$(curl -s "https://hub.docker.com/v2/repositories/${{ secrets.DOCKER_USERNAME }}/${{ env.EXPECTED_IMAGE_NAME }}/tags" | \
                 jq -r '.results | sort_by(.last_updated) | reverse | .[].name')
          
          # 轉換為數組並計算數量
          TAG_ARRAY=($TAGS)
          TOTAL_TAGS=${#TAG_ARRAY[@]}
          
          echo "找到 $TOTAL_TAGS 個映像標籤"
          
          # 如果超過限制，刪除較舊的映像
          if [ $TOTAL_TAGS -gt ${{ env.MAX_IMAGES_TO_KEEP }} ]; then
            # 計算需要刪除的數量
            TO_DELETE=$((TOTAL_TAGS - ${{ env.MAX_IMAGES_TO_KEEP }}))
            echo "將刪除 $TO_DELETE 個較舊的映像標籤"
            
            # 刪除較舊的映像
            for ((i = ${{ env.MAX_IMAGES_TO_KEEP }}; i < TOTAL_TAGS; i++)); do
              TAG_TO_DELETE=${TAG_ARRAY[$i]}
              echo "刪除映像: ${{ secrets.DOCKER_USERNAME }}/${{ env.EXPECTED_IMAGE_NAME }}:$TAG_TO_DELETE"
              
              # 使用 Docker Hub API 刪除標籤
              curl -X DELETE \
                -H "Authorization: JWT $(docker login --username ${{ secrets.DOCKER_USERNAME }} --password ${{ secrets.DOCKER_PASSWORD }} 2>&1 | grep token | cut -d' ' -f2)" \
                "https://hub.docker.com/v2/repositories/${{ secrets.DOCKER_USERNAME }}/${{ env.EXPECTED_IMAGE_NAME }}/tags/$TAG_TO_DELETE/"
            done
          else
            echo "映像數量在限制範圍內，無需刪除"
          fi

      - name: 設置 Docker Buildx
        if: steps.check_image.outputs.image_exists != 'true'
        uses: docker/setup-buildx-action@v3

      - name: 建立新映像
        if: steps.check_image.outputs.image_exists != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ env.EXPECTED_IMAGE_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ env.EXPECTED_IMAGE_NAME }}:$(date +%Y%m%d)

      - name: 檢驗映像
        run: |
          echo "檢驗映像狀態..."
          docker pull ${{ secrets.DOCKER_USERNAME }}/${{ env.EXPECTED_IMAGE_NAME }}:latest || true
          docker images | grep ${{ env.EXPECTED_IMAGE_NAME }} || true
          echo "映像管理完成"