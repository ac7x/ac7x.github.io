name: CodeQL 分析

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '0 0 * * 0'  # 每週日午夜執行

jobs:
  analyze:
    name: 分析程式碼
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript', 'typescript' ]

    steps:
      - name: 檢出儲存庫
        uses: actions/checkout@v3

      - name: 初始化 CodeQL
        uses: github/codeql-action/init@v2
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - name: 自動構建
        uses: github/codeql-action/autobuild@v2

      - name: 執行 CodeQL 分析
        uses: github/codeql-action/analyze@v2
        with:
          category: "/language:${{ matrix.language }}"
          
  lint-check:
    name: 檢查代碼風格
    runs-on: ubuntu-latest
    
    steps:
      - name: 檢出儲存庫
        uses: actions/checkout@v3
        
      - name: 設置 Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'pnpm'
          
      - name: 安裝依賴
        run: |
          corepack enable
          pnpm install
          
      - name: 執行 ESLint
        run: pnpm lint
