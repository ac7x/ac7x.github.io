name: Docker 构建与推送

on:
  workflow_dispatch:  # 允许手动触发工作流

jobs:
  docker-build-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout 仓库代码
      uses: actions/checkout@v2

    - name: 检查代码是否拉取
      run: ls -la

    - name: 登录 DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 构建 Docker 镜像
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/base-image:latest .

    - name: 获取所有 Docker 镜像列表
      id: images
      run: |
        # 获取所有镜像并过滤出名称为用户命名空间下的 base-image 的镜像
        docker images --format '{{.Repository}}:{{.Tag}} {{.CreatedAt}}' | grep "${{ secrets.DOCKER_USERNAME }}/base-image" > images.txt

    - name: 推送 Docker 镜像
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/base-image:latest