name: Docker 构建与推送

# 手动触发工作流或通过其他工作流触发
on:
  workflow_dispatch:  # 允许手动触发工作流
  # 也可以添加定时任务触发等事件：
  # schedule:
  #   - cron: "0 0 * * *"  # 示例定时任务，每天执行一次

jobs:
  docker-build-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout 仓库代码
      uses: actions/checkout@v2

    - name: 登录 DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 构建 Docker 镜像
      run: |
        docker build -t base.image:latest .

    - name: 推送 Docker 镜像
      run: |
        docker push base.image:latest
