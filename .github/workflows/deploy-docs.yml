name: Deploy Web Panel and Docs

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          npm install typedoc
          cd webpanel
          npm install

      - name: Generate Version Info
        run: |
          echo "$(date +%Y.%m.%d)-$(git rev-parse --short HEAD)" > core/version.txt
          echo "window.APP_VERSION = '$(cat core/version.txt)';" > webpanel/public/version.js

      - name: Build Docs
        run: |
          mkdir -p docs
          node core/scripts/generate-docs.js

      - name: Build Web Panel
        run: |
          cd webpanel
          # 確認 next.config.js 或 next.config.mjs 存在
          if [ ! -f next.config.js ] && [ ! -f next.config.mjs ]; then
            echo "創建 next.config.js"
            echo 'module.exports = { output: "export", images: { unoptimized: true } };' > next.config.js
          fi
          npm run build
          mkdir -p ../docs/webpanel
          cp -r out/* ../docs/webpanel/

      - name: Create index redirect
        run: |
          echo '<meta http-equiv="refresh" content="0;url=./webpanel/" />' > docs/index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages  # 部署到 gh-pages 分支
          folder: docs  # 部署 docs 資料夾的內容