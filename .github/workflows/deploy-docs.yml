name: Deploy Web Panel and Docs

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v3
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install Dependencies
        run: |
          mkdir -p docs
          cd webpanel
          pnpm install

      - name: Generate Version Info
        run: |
          echo "$(date +%Y.%m.%d)-$(git rev-parse --short HEAD)" > core/version.txt
          mkdir -p webpanel/public
          echo "window.APP_VERSION = '$(cat core/version.txt)';" > webpanel/public/version.js

      - name: Generate Rules Documentation
        run: |
          cd core
          node scripts/generate-docs.js

      - name: Build Web Panel
        run: |
          cd webpanel
          pnpm run build
          mkdir -p ../docs/webpanel
          cp -r out/* ../docs/webpanel/

      - name: Create index redirect
        run: |
          echo '<!DOCTYPE html>
          <html>
          <head>
            <meta http-equiv="refresh" content="0;url=./webpanel/" />
            <title>框架適配倉儲規則中心</title>
          </head>
          <body>
            <p>請稍候，正在重定向到 <a href="./webpanel/">框架適配倉儲規則中心</a>...</p>
          </body>
          </html>' > docs/index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs
          clean: true