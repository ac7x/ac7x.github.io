name: Deploy Web Panel and Docs

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: |
          npm install typedoc
          cd webpanel
          npm install

      - name: Build Docs
        run: npx typedoc core/rules/*.json --out ./docs

      - name: Build Web Panel
        run: |
          cd webpanel
          npm run build
          npm run export
          cp -r out/* ../docs/webpanel/

      - name: Create index redirect
        run: |
          echo '<meta http-equiv="refresh" content="0;url=./webpanel/" />' > docs/index.html

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages  # 部署到 gh-pages 分支
          folder: docs  # 部署 docs 資料夾的內容