name: Docker 检查

on:
  schedule:
    - cron: "0 * * * *"  # 每小时执行一次
  workflow_dispatch:  # 允许手动触发工作流

jobs:
  check-image:
    runs-on: ubuntu-latest

    steps:
    - name: 登录 DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 检查镜像是否存在
      id: check_image
      run: |
        IMAGE_NAME="base.image"
        RESPONSE=$(curl -s -H "Authorization: Bearer ${{ secrets.DOCKER_TOKEN }}" "https://hub.docker.com/v2/repositories/${{ secrets.DOCKER_USERNAME }}/${IMAGE_NAME}/")
        
        # 检查响应中是否有镜像
        if echo "$RESPONSE" | grep -q '"name": "'"$IMAGE_NAME"'"'; then
          echo "镜像 $IMAGE_NAME 存在"
          echo "image_exists=true" >> $GITHUB_ENV
        else
          echo "镜像 $IMAGE_NAME 不存在"
          echo "image_exists=false" >> $GITHUB_ENV
        fi

  docker-cleanup:
    if: env.image_exists == 'true'
    runs-on: ubuntu-latest

    steps:
    - name: 执行 Docker 清理
      run: |
        echo "执行 Docker 镜像清理操作"
        # 清理镜像相关的命令

  docker-build-push:
    if: env.image_exists == 'false'
    runs-on: ubuntu-latest

    steps:
    - name: 执行 Docker 构建与推送
      run: |
        echo "执行 Docker 构建与推送操作"
        # 构建和推送镜像的命令
