name: Docker 镜像清理

# 手动触发工作流
on:
  workflow_dispatch: 

jobs:
  clean-docker-images:
    runs-on: ubuntu-latest

    steps:
    - name: 登录 DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 获取所有 Docker 镜像列表
      id: images
      run: |
        # 获取所有镜像并过滤出名称为 base.image 的镜像
        docker images --format '{{.Repository}}:{{.Tag}} {{.CreatedAt}}' | grep "base.image" > images.txt
        # 获取所有非 base.image 的镜像并删除
        docker images --format '{{.Repository}}:{{.Tag}}' | grep -v "base.image" | xargs -I {} docker rmi {}

    - name: 检查是否有 base.image 镜像
      run: |
        if [ ! -s images.txt ]; then
          echo "没有找到符合条件的镜像"
          exit 0
        fi

    - name: 保留最近 5 个 base.image 镜像
      run: |
        # 排序并保留前五个创建时间最接近的 base.image 镜像
        top_images=$(cat images.txt | sort -k2 -r | head -n 5)
        echo "保留的镜像："
        echo "$top_images"
        
        # 获取保留镜像的名称并删除其他镜像
        all_images=$(cat images.txt)
        for image in $all_images; do
          if ! echo "$top_images" | grep -q "$image"; then
            docker rmi $image || true
          fi
        done
