name: Validate Prompt Rules
on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Verify Rule Files
        run: |
          npm install crypto
          node core/scripts/verify-signatures.js

      - name: Validate Rule Examples
        run: |
          node core/scripts/validate-examples.js

      - name: Install Playwright
        run: |
          npm install @playwright/test
          npx playwright install --with-deps chromium
      
      - name: Test Rule Examples
        run: |
          npm install -g typescript
          # 這裡先創建測試檔案
          node -e "
          const fs = require('fs');
          if (!fs.existsSync('tests')) fs.mkdirSync('tests');
          fs.writeFileSync('tests/rules.spec.js', 'const { test } = require(\"@playwright/test\"); test(\"placeholder\", () => { /* 未實現 */ });');
          "
          npx playwright test tests/rules.spec.js