name: Validate Prompt Rules
on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Verify Rule Files
        run: |
          # crypto 現在是 Node.js 內建模組，不需要安裝
          node core/scripts/verify-signatures.js
        env:
          CI: true
          AUTO_FIX_CHECKSUMS: true

      - name: Validate Rule Examples
        run: |
          node core/scripts/validate-examples.js

      - name: Install Playwright
        run: |
          npm install @playwright/test
          npx playwright install --with-deps chromium
      
      - name: Test Rule Examples
        run: |
          npm install -g typescript
          # 移動 test-rules.spec.js 到正確位置
          mkdir -p tests
          cp core/scripts/test-rules.spec.js tests/rules.spec.js
          npx playwright test tests/rules.spec.js